<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galáxia em Foco | Contato</title>
<style>
    
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    .nav-bar {
        background-color: #333;
        color: #fff;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        width: 100%;
        top: 0;
    }

    .nav-bar .links a {
        color: #fff;
        text-decoration: none;
        margin-left: 20px;
    }

    .content-section {
        margin-top: 120px;
        padding: 20px;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
    }

    .grid-form {
        display: flex;
        gap: 40px;
        background: #fff;
        padding: 30px;
        border-radius: 8px;
        margin-top: 20px;
    }

    .form-text, .form-inputs {
        flex: 1;
    }

    
    .form-inputs {
        display: flex;
        flex-direction: column;
        gap: 15px; 
    }

    
    .form-inputs input, 
    .form-inputs textarea, 
    .form-inputs button {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
    }

    .form-inputs textarea {
        resize: vertical; /* Permite redimensionar apenas a altura */
        min-height: 100px;
    }

    .form-inputs button {
        background-color: #5c67f2;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    .form-inputs button:hover {
        background-color: #4a54e1;
    }

    .sticky-note {
        background-color: #e1f5fe;
        color: #0288d1;
        padding: 10px;
        border-radius: 4px;
        margin-top: 15px;
        display: inline-block;
    }
</style>
</head>
<body>

<div class="nav-bar">
    <div class="logo">🌌 Galáxia em Foco</div>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="galeria.html">Galeria</a>
        <a href="contato.html">Contato</a>
    </div>
</div>

<div class="content-section">
    <h2>Entre em Contato</h2>
    <div class="grid-form">
        <div class="form-text">
            <p>Envie sua mensagem e participe do nosso grupo de astrônomos.</p>
            <div class="sticky-note">ℹ️ Central de Atendimento 24h</div>
        </div>
        
        <div class="form-inputs">
            <input type="text" placeholder="Seu Nome">
            <input type="email" placeholder="Seu E-mail">
            <textarea placeholder="Sua Mensagem"></textarea>
            <button>Enviar</button>
        </div>
    </div>
</div>

</body>
</html>
